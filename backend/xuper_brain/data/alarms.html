<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XuperBrain Alarms Panel</title>
    <style>
        body {
            background: #060713;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2.5rem;
            width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            text-align: center;
        }
        h1 {
            color: #ef4444; /* Crimson */
            font-size: 2rem;
            margin: 0 0 0.2rem 0;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            font-weight: 800;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #3b82f6; /* Electric Blue */
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
            font-weight: 600;
        }
        .alarm-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-left: 4px solid #3b82f6;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .alarm-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-left-color: #ef4444;
            transform: translateX(5px);
        }
        .alarm-info {
            text-align: left;
        }
        .alarm-time {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
        }
        .alarm-label {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }
        .alarm-status {
            font-size: 0.75rem;
            padding: 0.3rem 0.7rem;
            border-radius: 9999px;
            font-weight: 600;
        }
        .alarm-status.active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .alarm-status.triggered {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #4b5563;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>⏰ XUPERBRAIN</h1>
        <div class="subtitle">Panel de Alarmas Activas</div>
        <div id="alarms-list">
            
            <div class="alarm-card" style="border-left-color: #10b981">
                <div class="alarm-info">
                    <div class="alarm-time">07:00 </div>
                    <div class="alarm-label">Trotar 🏃‍♂️ (2026-06-02)</div>
                </div>
                <div class="alarm-status triggered">Sonada</div>
            </div>
            

            <div class="alarm-card" style="border-left-color: #10b981">
                <div class="alarm-info">
                    <div class="alarm-time">07:15 </div>
                    <div class="alarm-label">Trotar 🏃‍♂️ (2026-06-02)</div>
                </div>
                <div class="alarm-status triggered">Sonada</div>
            </div>
            

            <div class="alarm-card" style="border-left-color: #10b981">
                <div class="alarm-info">
                    <div class="alarm-time">07:30 </div>
                    <div class="alarm-label">Trotar 🏃‍♂️ (2026-06-02)</div>
                </div>
                <div class="alarm-status triggered">Sonada</div>
            </div>
            
        </div>
        <div class="footer">Sistema de Monitoreo Local en Tiempo Real</div>
    </div>
</body>
</html>
