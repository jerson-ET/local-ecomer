<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente neón rosa → indigo -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="50%" style="stop-color:#c026d3"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stronger glow for background -->
    <filter id="glow-bg">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="512" height="512" rx="80" fill="#08080f"/>
  
  <!-- Glow de fondo sutil -->
  <g filter="url(#glow-bg)" opacity="0.4">
    <path d="M140 140 L140 372 L240 372 L240 340 M240 280 L320 280 L320 248 M240 210 L310 210 L310 178 M240 340 L340 340 L340 372 L340 310 L280 280" 
          fill="none" stroke="url(#neon)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Monograma LE principal con glow -->
  <g filter="url(#glow)">
    <!-- L vertical -->
    <line x1="152" y1="130" x2="152" y2="382" stroke="url(#neon)" stroke-width="20" stroke-linecap="round"/>
    <!-- L horizontal -->
    <line x1="152" y1="382" x2="256" y2="382" stroke="url(#neon)" stroke-width="20" stroke-linecap="round"/>
    
    <!-- E vertical (comparte con L) -->
    <line x1="256" y1="130" x2="256" y2="382" stroke="url(#neon)" stroke-width="20" stroke-linecap="round"/>
    <!-- E top -->
    <line x1="256" y1="130" x2="362" y2="130" stroke="url(#neon)" stroke-width="20" stroke-linecap="round"/>
    <!-- E middle -->
    <line x1="256" y1="256" x2="340" y2="256" stroke="url(#neon)" stroke-width="20" stroke-linecap="round"/>
    <!-- E bottom -->
    <line x1="256" y1="382" x2="362" y2="382" stroke="url(#neon)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Punto decorativo futurista -->
  <circle cx="362" cy="256" r="8" fill="#f43f5e" filter="url(#glow)"/>
</svg>